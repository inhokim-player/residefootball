name: U25 Data Pipeline — Daily Auto-Update

on:
  # 매일 KST 06:00 (= UTC 21:00 전날)
  schedule:
    - cron: "0 21 * * *"

  # GitHub 웹에서 수동 실행
  workflow_dispatch:
    inputs:
      reason:
        description: "수동 실행 이유"
        required: false
        default: "manual trigger"

# 동시 실행 방지
concurrency:
  group: u25-pipeline
  cancel-in-progress: false

# Node.js 24 강제 적용 → deprecation 경고 해결
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    name: "Run U25 Pipeline & Push Data"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. 레포지토리 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Python 설정 (cache 옵션 제거 → requirements.txt 없어도 오류 안 남)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 의존성 설치 (requirements.txt 없으면 기본 패키지로 대체)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            echo "requirements.txt 발견 — 설치 시작"
            pip install -r requirements.txt
          else
            echo "requirements.txt 없음 — 기본 패키지 설치"
            pip install requests python-dotenv pandas numpy
          fi

      # 4. 파이프라인 실행
      - name: Run u25_pipeline.py
        env:
          API_KEY:          ${{ secrets.API_KEY }}
          API_SPORTS_KEY:   ${{ secrets.API_SPORTS_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          DB_URL:           ${{ secrets.DB_URL }}
          ENV:              production
        run: |
          echo "▶ Started: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          python u25_pipeline.py
          echo "▶ Finished: $(date '+%Y-%m-%d %H:%M:%S UTC')"

      # 5. 변경 파일 확인
      - name: Show changed files
        run: |
          git status --short
          ls -lh data/ 2>/dev/null || echo "(data/ 디렉토리 없음)"

      # 6. Git 커밋 & 푸시
      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: auto-update U25 data [$(date '+%Y-%m-%d %H:%M UTC')]"
            git push origin main
            echo "✅ 커밋 & 푸시 완료"
          else
            echo "⏭ 변경 없음 — 커밋 스킵"
          fi

